<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 680 800" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Architektura Word2Vec Skip-gram z oknem rozmiaru 5 i k-hot wektorem target</title>
<desc>Wizualizacja sieci Word2Vec z dłuższym zdaniem, sliding window rozmiaru 5 wokół "kot" i k-hot wektorem target z liniami loss od każdej jedynki</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
@media (prefers-color-scheme: dark) {
.t { fill: #D3D1C7; }
.ts { fill: #B4B2A9; }
.th { fill: #D3D1C7; }
}
</style>
</defs>

